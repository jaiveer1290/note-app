<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
      padding:20px;
    }

    .container{
      max-width:700px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:16px;
    }

    button{
      padding:10px 20px;
      border:none;
      background:#007bff;
      color:white;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#0056b3;
    }

    .notes{
      margin-top:20px;
    }

    .note{
      background:#fafafa;
      padding:15px;
      margin-bottom:15px;
      border-left:5px solid #007bff;
      border-radius:5px;
    }

    .note h3{
      margin-bottom:10px;
    }

    .actions{
      margin-top:10px;
    }

    .delete-btn{
      background:red;
      margin-left:10px;
    }

    .edit-btn{
      background:green;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Notes App</h1>

    <input type="text" id="title" placeholder="Enter Note Title">

    <textarea id="content" rows="5" placeholder="Write your note..."></textarea>

    <button onclick="addNote()">Add Note</button>

    <div class="notes" id="notesContainer"></div>
  </div>

  <script>

  let notes = JSON.parse(localStorage.getItem("notes")) || [];

  displayNotes();

  function addNote() {

    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if(title === "" || content === "") {
      alert("Please fill all fields");
      return;
    }

    const note = {
      id: Date.now(),
      title,
      content
    };

    notes.push(note);

    saveNotes();

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";

    displayNotes();
  }

  function displayNotes() {

    const notesContainer = document.getElementById("notesContainer");

    notesContainer.innerHTML = "";

    notes.forEach(note => {

      notesContainer.innerHTML += `
        <div class="note">
          <h3>${note.title}</h3>
          <p>${note.content}</p>

          <div class="actions">
            <button class="edit-btn" onclick="editNote(${note.id})">
              Edit
            </button>

            <button class="delete-btn" onclick="deleteNote(${note.id})">
              Delete
            </button>
          </div>
        </div>
      `;
    });
  }

  function deleteNote(id) {

    notes = notes.filter(note => note.id !== id);

    saveNotes();

    displayNotes();
  }

  function editNote(id) {

    const note = notes.find(note => note.id === id);

    const newTitle = prompt("Edit Title", note.title);
    const newContent = prompt("Edit Content", note.content);

    if(newTitle !== null && newContent !== null) {

      note.title = newTitle;
      note.content = newContent;

      saveNotes();

      displayNotes();
    }
  }

  function saveNotes() {
    localStorage.setItem("notes", JSON.stringify(notes));
  }

</script>
</body>
</html>
